<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Superhero TTRPG Character Sheet</title>
  <style>
    :root {
      --ink: #050505;
      --paper: #fffdf8;
      --red: #d91e2d;
      --dark-red: #9f111b;
      --blue: #0064ad;
      --navy: #101b4c;
      --yellow: #ffd522;
      --pale: #eef7fb;
      --line: #d6e0e8;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18px 18px, rgba(0,0,0,.12) 1px, transparent 1.7px) 0 0 / 12px 12px,
        linear-gradient(135deg, #edf7ff, #fff);
    }
    button, input, textarea, select { font: inherit; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 12px;
      background: rgba(255,255,255,.95);
      border-bottom: 4px solid var(--ink);
    }
    .toolbar button, .toolbar label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 8px 13px;
      border: 3px solid var(--ink);
      background: var(--yellow);
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .9rem;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      line-height: 1.1;
      white-space: nowrap;
    }
    .toolbar input[type="file"], .hidden-file {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    .character-switcher {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 6px 10px;
      border: 3px solid var(--ink);
      background: white;
      box-shadow: 3px 3px 0 var(--ink);
      text-transform: uppercase;
      line-height: 1;
      min-width: 420px;
    }
    .character-switcher span {
      color: var(--navy);
      flex: 0 0 auto;
    }
    .character-switcher input {
      width: 100%;
      min-width: 210px;
      min-height: 26px;
      border: 3px solid var(--ink);
      padding: 3px 6px;
      background: var(--pale);
      color: var(--ink);
    }
    .export-picker {
      display: inline-flex;
      align-items: stretch;
      min-height: 38px;
      border: 3px solid var(--ink);
      background: var(--yellow);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .export-picker button {
      border: 0;
      box-shadow: none;
    }
    .page {
      width: min(1260px, 100%);
      margin: 0 auto;
      padding: 24px 16px 44px;
    }
    .sheet {
      position: relative;
      overflow: hidden;
      min-height: 1450px;
      padding: 28px;
      border: 6px solid var(--ink);
      background:
        linear-gradient(130deg, transparent 0 15%, var(--red) 15% 21%, transparent 21% 51%, var(--yellow) 51% 58%, transparent 58%),
        linear-gradient(60deg, var(--blue) 0 10%, transparent 10% 74%, var(--red) 74% 86%, var(--yellow) 86%),
        var(--paper);
      box-shadow: 0 24px 34px rgba(0,0,0,.25);
      isolation: isolate;
    }
    .sheet::before {
      content: "";
      position: absolute;
      inset: -18%;
      z-index: -1;
      background:
        repeating-conic-gradient(from 0deg at 61% 34%, rgba(0,0,0,.24) 0 1deg, transparent 1deg 8deg),
        repeating-radial-gradient(circle at 38% 45%, rgba(0,0,0,.12) 0 2px, transparent 2px 12px);
      opacity: .23;
    }
    .top {
      display: grid;
      gap: 14px;
      margin-bottom: 18px;
      align-items: stretch;
    }
    .photo, .panel, .field, .rank-card, .hero-art, .ability, .damage, .power-card {
      border: 5px solid var(--ink);
      background: rgba(255,255,255,.94);
      box-shadow: 5px 5px 0 var(--ink);
    }
    .photo, .hero-art {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 320px;
      overflow: hidden;
      cursor: pointer;
    }
    .photo img, .hero-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .photo.has-image img, .hero-art.has-image img { display: block; }
    .photo.has-image .drop, .hero-art.has-image .drop { display: none; }
    .drop {
      width: min(230px, 90%);
      color: white;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 var(--ink), -1px -1px 0 var(--ink), 1px -1px 0 var(--ink), -1px 1px 0 var(--ink);
      line-height: .95;
      transform: skew(-8deg);
      font-size: clamp(1.3rem, 3vw, 2rem);
    }
    h1 {
      margin: 0;
      color: white;
      text-align: left;
      text-transform: uppercase;
      text-shadow: 4px 4px 0 var(--ink), -2px -2px 0 var(--ink), 2px -2px 0 var(--ink), -2px 2px 0 var(--ink);
      transform: skew(-7deg);
      line-height: .9;
      font-size: clamp(2.8rem, 6vw, 5.2rem);
    }
    .rank-stack {
      display: grid;
      grid-template-columns: 1fr 1fr 1.4fr;
      gap: 12px;
      align-content: stretch;
      width: min(720px, 100%);
    }
    .rank-card {
      min-height: 92px;
      padding: 8px;
      text-align: center;
      border-color: var(--red);
      background: linear-gradient(135deg, white 0 72%, #fae9e9 72%);
      display: grid;
      align-content: center;
    }
    .rank-card label {
      display: block;
      color: var(--navy);
      text-transform: uppercase;
      font-size: 1rem;
      text-shadow: none;
    }
    .rank-card input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
      text-align: center;
      font-size: clamp(1.7rem, 4vw, 2.7rem);
    }
    .movement-card {
      display: grid;
      align-content: center;
      gap: 8px;
    }
    .movement-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .movement-fields span {
      display: grid;
      gap: 3px;
      color: var(--navy);
      font-size: .8rem;
      text-transform: uppercase;
    }
    .movement-fields input {
      border: 3px solid var(--ink);
      background: white;
      font-size: 1.2rem;
    }
    .grid {
      display: grid;
      grid-template-columns: .92fr 1.08fr;
      gap: 18px;
    }
    .left, .right { display: flex; flex-direction: column; gap: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .field {
      display: grid;
      gap: 5px;
      min-height: 70px;
      padding: 9px 13px 11px;
      transform: skew(-3deg);
    }
    label, .panel-title {
      display: block;
      color: white;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 var(--ink), -1px -1px 0 var(--ink), 1px -1px 0 var(--ink), -1px 1px 0 var(--ink);
      font-size: clamp(1rem, 2vw, 1.55rem);
      line-height: .9;
    }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--navy);
      font-family: "Arial Narrow", Arial, sans-serif;
      font-weight: 900;
      font-size: 1.08rem;
      resize: vertical;
    }
    textarea { min-height: 115px; line-height: 1.25; }
    .panel { padding: 12px; }
    .red-panel { border-color: var(--red); }
    .abilities {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-top: 10px;
    }
    .ability {
      display: grid;
      grid-template-columns: 1fr 82px;
      min-height: 62px;
      overflow: hidden;
      border-color: var(--red);
      box-shadow: 3px 3px 0 var(--ink);
    }
    .ability label {
      display: grid;
      place-items: center start;
      padding: 8px;
      background: var(--red);
      font-size: 1rem;
    }
    .ability input {
      border: 0;
      background: white;
      color: var(--ink);
      text-align: center;
      font-size: 1.55rem;
    }
    .stat-controls {
      display: grid;
      gap: 10px;
      font-family: "Arial Narrow", Arial, sans-serif;
      font-weight: 900;
    }
    .statistics-grid {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 1fr;
      gap: 14px;
      align-items: center;
      margin-top: 10px;
    }
    .radar {
      width: 100%;
      min-width: 220px;
      aspect-ratio: 1;
    }
    .stat-line {
      display: grid;
      grid-template-columns: 110px 1fr 34px;
      gap: 8px;
      align-items: center;
    }
    .stat-line b {
      color: white;
      text-transform: uppercase;
      text-shadow: 2px 2px 0 var(--ink), -1px -1px 0 var(--ink), 1px -1px 0 var(--ink), -1px 1px 0 var(--ink);
    }
    input[type="range"] { width: 100%; accent-color: var(--red); }
    .health-controls {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 9px;
      margin-top: 10px;
    }
    .health-control {
      min-height: 82px;
      padding: 8px;
      border: 4px solid var(--ink);
      background: rgba(255,255,255,.96);
      box-shadow: 3px 3px 0 var(--ink);
      display: grid;
      align-content: start;
    }
    .health-control label {
      color: var(--navy);
      text-shadow: none;
      font-size: .95rem;
      min-height: 34px;
      display: flex;
      align-items: flex-start;
    }
    .health-control input {
      margin-top: 6px;
      border: 3px solid var(--ink);
      background: white;
      color: var(--ink);
      text-align: center;
      font-size: 1.25rem;
    }
    .tracker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin-top: 10px;
    }
    .tracker button, .dice-row button {
      border: 3px solid var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      cursor: pointer;
      text-transform: uppercase;
    }
    .tracker button { min-height: 42px; background: var(--yellow); }
    .meter {
      height: 54px;
      margin-top: 14px;
      border: 5px solid var(--ink);
      background: white;
      overflow: hidden;
      box-shadow: 4px 4px 0 var(--ink);
    }
    .meter span {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--yellow));
    }
    .illustration-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .hero-art {
      min-height: 560px;
      background:
        repeating-radial-gradient(circle at center, transparent 0 36px, rgba(17,28,79,.16) 37px 38px),
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(237,246,251,.93));
    }
    .hero-art::after {
      content: attr(data-caption);
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 9px 14px;
      border-top: 5px solid var(--ink);
      background: rgba(255,255,255,.86);
      color: white;
      text-shadow: 3px 3px 0 var(--ink), -1px -1px 0 var(--ink), 1px -1px 0 var(--ink), -1px 1px 0 var(--ink);
      font-size: clamp(1rem, 2vw, 1.55rem);
    }
    .bio-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 9px;
    }
    .bio-grid .field {
      min-height: 60px;
      box-shadow: 3px 3px 0 var(--ink);
    }
    .description-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .description-box {
      display: grid;
      gap: 6px;
      border: 5px solid var(--ink);
      background: rgba(255,255,255,.94);
      box-shadow: 3px 3px 0 var(--ink);
      padding: 10px;
    }
    .description-box textarea {
      min-height: 110px;
      border: 3px solid var(--line);
      background: var(--pale);
      padding: 8px;
    }
    .parents-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 9px;
    }
    .parent-card {
      display: grid;
      gap: 8px;
      border: 5px solid var(--ink);
      background: rgba(255,255,255,.94);
      box-shadow: 3px 3px 0 var(--ink);
      padding: 10px;
    }
    .parent-card label {
      font-size: 1rem;
    }
    .parent-photo {
      min-height: 150px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      background:
        repeating-radial-gradient(circle at center, transparent 0 22px, rgba(17,28,79,.12) 23px 24px),
        white;
      overflow: hidden;
      cursor: pointer;
    }
    .parent-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }
    .parent-photo.has-image img { display: block; }
    .parent-photo.has-image .drop { display: none; }
    .parent-photo .drop {
      font-size: 1rem;
    }
    .tall { min-height: 215px; }
    .quirk-panel textarea {
      min-height: 285px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      padding-top: 32px;
    }
    .power-card {
      position: relative;
      min-height: 320px;
      padding: 54px 10px 10px;
      border-color: var(--navy);
      border-radius: 10px;
      background:
        linear-gradient(135deg, transparent 0 67%, var(--yellow) 67% 72%, var(--blue) 72% 78%, var(--red) 78% 84%, transparent 84%),
        white;
    }
    .card-number {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      width: 68px;
      height: 68px;
      border: 5px solid var(--navy);
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 0 5px var(--red), 4px 4px 0 var(--ink);
      color: var(--navy);
      text-align: center;
      font-size: 1.65rem;
      padding: 0;
      outline: 0;
    }
    .power-card input, .power-card textarea {
      border: 3px solid var(--line);
      background: var(--pale);
      padding: 6px;
      font-size: .9rem;
    }
    .power-card label {
      font-size: clamp(.88rem, 1.25vw, 1.05rem);
    }
    .power-card .card-number {
      border: 5px solid var(--navy);
      border-radius: 50%;
      background: white;
      padding: 0;
      font-size: 1.65rem;
      box-shadow: 0 0 0 5px var(--red), 4px 4px 0 var(--ink);
    }
    .power-card textarea { min-height: 150px; }
    .dice-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
    }
    .dice-row button {
      width: 54px;
      min-height: 40px;
      background: var(--red);
      color: white;
    }
    .dice-result {
      min-width: 104px;
      padding: 7px 10px;
      border: 3px solid var(--ink);
      background: var(--yellow);
      text-align: center;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .rank-stack { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 700px) {
      .sheet { padding: 18px; }
      .toolbar { justify-content: stretch; }
      .toolbar button, .toolbar label { flex: 1 1 auto; }
      .character-switcher { min-width: 100%; }
      .row, .abilities, .health-controls, .bio-grid, .parents-grid, .cards, .rank-stack, .statistics-grid, .illustration-grid { grid-template-columns: 1fr; }
      .hero-art { min-height: 500px; }
      .stat-line { grid-template-columns: 90px 1fr 30px; }
    }
    @page {
      size: A3 portrait;
      margin: 8mm;
    }
    @media print {
      html, body {
        width: 297mm;
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
      .toolbar { display: none; }
      .page {
        width: 281mm;
        max-width: none;
        padding: 0;
      }
      .sheet {
        width: 281mm;
        min-height: auto;
        padding: 7mm;
        box-shadow: none;
        border-width: 1.4mm;
      }
      .grid {
        grid-template-columns: .92fr 1.08fr;
      }
      .rank-stack {
        grid-template-columns: 1fr 1fr 1.4fr;
      }
      .row, .bio-grid, .parents-grid, .illustration-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .abilities {
        grid-template-columns: repeat(2, 1fr);
      }
      .health-controls {
        grid-template-columns: repeat(4, 1fr);
      }
      .statistics-grid {
        grid-template-columns: minmax(220px, 1fr) 1fr;
      }
      .cards {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <nav class="toolbar" aria-label="Sheet tools">
    <label class="character-switcher" for="characterSlot"><span>Character</span><input id="characterSlot" type="text" placeholder="default"></label>
    <button id="openCharacterBtn" type="button">Open Character</button>
    <button id="saveBtn" type="button">Save</button>
    <button id="loadBtn" type="button">Load</button>
    <button id="clearBtn" type="button">Clear</button>
    <div class="export-picker">
      <button id="exportPngBtn" type="button" onclick="exportPng()">Export PNG</button>
    </div>
    <label>Import<input id="importFile" type="file" accept="application/json"></label>
  </nav>

  <main class="page">
    <section class="sheet">
      <header class="top">
        <h1>Hero Course File</h1>
        <div class="rank-stack">
          <div class="rank-card"><label for="rank">Rank</label><input id="rank" data-save="rank" type="number" min="1" max="20" value="1"></div>
          <div class="rank-card"><label for="karma">Karma</label><input id="karma" data-save="karma" type="number" min="0" value="0"></div>
          <div class="rank-card movement-card">
            <label>Movement</label>
            <div class="movement-fields">
              <span>Walk (ft)<input id="walkSpeed" data-save="walkSpeed" type="number" value="30"></span>
              <span>Fly (ft)<input id="flySpeed" data-save="flySpeed" type="number" value="0"></span>
            </div>
          </div>
        </div>
      </header>

      <div class="grid">
        <section class="left">
          <div class="row">
            <div class="field"><label for="characterName">Character Name</label><input id="characterName" data-save="characterName" type="text"></div>
            <div class="field"><label for="heroName">Hero Name</label><input id="heroName" data-save="heroName" type="text"></div>
          </div>
          <div class="row">
            <div class="field"><label for="age">Age</label><input id="age" data-save="age" type="number" min="1"></div>
            <div class="field"><label for="height">Height</label><input id="height" data-save="height" type="text"></div>
          </div>
          <div class="row">
            <div class="field"><label for="gender">Gender</label><input id="gender" data-save="gender" type="text"></div>
            <div class="field"><label for="origin">Occupation</label><input id="origin" data-save="origin" type="text"></div>
          </div>
          <div class="field"><label for="quirk">Power / Quirk</label><input id="quirk" data-save="quirk" type="text"></div>

          <div class="panel red-panel">
            <span class="panel-title">Abilities</span>
            <div class="abilities">
              <div class="ability"><label for="melee">Melee</label><input id="melee" data-save="melee" type="number" value="0"></div>
              <div class="ability"><label for="agility">Agility</label><input id="agility" data-save="agility" type="number" value="0"></div>
              <div class="ability"><label for="resilience">Resilience</label><input id="resilience" data-save="resilience" type="number" value="0"></div>
              <div class="ability"><label for="perceptive">Perceptive</label><input id="perceptive" data-save="perceptive" type="number" value="0"></div>
              <div class="ability"><label for="charisma">Charisma</label><input id="charisma" data-save="charisma" type="number" value="0"></div>
              <div class="ability"><label for="logic">Logic</label><input id="logic" data-save="logic" type="number" value="0"></div>
            </div>
          </div>

          <div class="panel">
            <span class="panel-title">Statistics</span>
            <div class="statistics-grid">
              <svg class="radar" viewBox="0 0 240 240" role="img" aria-label="Hero statistics radar chart">
                <g fill="none" stroke="#9fb4c8" stroke-width="1.5">
                  <polygon points="120,24 211,90 176,198 64,198 29,90"></polygon>
                  <polygon points="120,48 188,98 162,178 78,178 52,98"></polygon>
                  <polygon points="120,72 166,106 148,158 92,158 74,106"></polygon>
                  <polygon points="120,96 143,113 134,139 106,139 97,113"></polygon>
                  <line x1="120" y1="120" x2="120" y2="24"></line>
                  <line x1="120" y1="120" x2="211" y2="90"></line>
                  <line x1="120" y1="120" x2="176" y2="198"></line>
                  <line x1="120" y1="120" x2="64" y2="198"></line>
                  <line x1="120" y1="120" x2="29" y2="90"></line>
                </g>
                <polygon id="radarShape" points="" fill="rgba(0,100,173,.28)" stroke="#0064ad" stroke-width="4"></polygon>
                <g font-family="Impact, Arial Black, sans-serif" font-size="14" fill="#050505" text-anchor="middle">
                  <text x="120" y="16">Power</text>
                  <text x="224" y="91">Speed</text>
                  <text x="179" y="222">Intelligence</text>
                  <text x="61" y="222">Technique</text>
                  <text x="18" y="91">Shield</text>
                </g>
              </svg>
              <div class="stat-controls">
                <div class="stat-line"><b>Power</b><input data-stat="power" data-save="power" type="range" min="0" max="10" value="5"><span>5</span></div>
                <div class="stat-line"><b>Speed</b><input data-stat="speed" data-save="speed" type="range" min="0" max="10" value="5"><span>5</span></div>
                <div class="stat-line"><b>Mind</b><input data-stat="mind" data-save="mind" type="range" min="0" max="10" value="5"><span>5</span></div>
                <div class="stat-line"><b>Skill</b><input data-stat="skill" data-save="skill" type="range" min="0" max="10" value="5"><span>5</span></div>
                <div class="stat-line"><b>Shield</b><input data-stat="shield" data-save="shield" type="range" min="0" max="10" value="5"><span>5</span></div>
              </div>
            </div>
            <div class="dice-row">
              <button type="button" data-dice="4">d4</button>
              <button type="button" data-dice="6">d6</button>
              <button type="button" data-dice="8">d8</button>
              <button type="button" data-dice="10">d10</button>
              <button type="button" data-dice="12">d12</button>
              <button type="button" data-dice="20">d20</button>
              <output id="diceResult" class="dice-result">Roll</output>
            </div>
          </div>

          <div class="panel red-panel">
            <span class="panel-title">Damage</span>
            <div class="health-controls">
              <div class="health-control"><label for="health">Current Health</label><input id="health" data-save="health" type="number" min="0" value="100"></div>
              <div class="health-control"><label for="maxHealth">Max Health</label><input id="maxHealth" data-save="maxHealth" type="number" min="1" value="100"></div>
              <div class="health-control"><label for="damageAmount">Damage Amount</label><input id="damageAmount" data-save="damageAmount" type="number" min="0" value="10"></div>
              <div class="health-control"><label for="healAmount">Heal Amount</label><input id="healAmount" data-save="healAmount" type="number" min="0" value="10"></div>
            </div>
            <div class="tracker">
              <button type="button" data-health-action="damage">Take Damage</button>
              <button type="button" data-health-action="heal">Heal</button>
              <button type="button" data-hit="full">Full Heal</button>
            </div>
            <div class="meter"><span id="healthMeter"></span></div>
          </div>

          <div class="panel quirk-panel">
            <span class="panel-title">Quirk</span>
            <div class="field">
              <label for="quirkSpeciality">Quirk Speciality</label>
              <select id="quirkSpeciality" data-save="quirkSpeciality">
                <option value=""></option>
                <option>Melee</option>
                <option>Resilience</option>
                <option>Charisma</option>
                <option>Agility</option>
                <option>Perceptive</option>
                <option>Logic</option>
              </select>
            </div>
            <textarea id="powers" data-save="powers" class="tall" placeholder="Quirk effects, limits, special moves, drawbacks..."></textarea>
          </div>
        </section>

        <section class="right">
          <div class="illustration-grid">
            <label class="hero-art" data-caption="FULL-BODY CHARACTER AREA" for="characterBodyInput">
              <img id="characterBodyPreview" alt="">
              <span class="drop">Click to add<br>full-body character</span>
            </label>
            <label class="hero-art" data-caption="FULL HERO COSTUME AREA" for="heroCostumeInput">
              <img id="heroCostumePreview" alt="">
              <span class="drop">Click to add<br>hero costume</span>
            </label>
          </div>
          <div class="panel red-panel">
            <span class="panel-title">Biography</span>
            <div class="parents-grid">
              <div class="parent-card">
                <label for="parentOneName">Parent Name</label>
                <input id="parentOneName" data-save="parentOneName" type="text">
                <label class="parent-photo" for="parentOneInput">
                  <img id="parentOnePreview" alt="">
                  <span class="drop">Parent<br>Photo</span>
                </label>
              </div>
              <div class="parent-card">
                <label for="parentTwoName">Parent Name</label>
                <input id="parentTwoName" data-save="parentTwoName" type="text">
                <label class="parent-photo" for="parentTwoInput">
                  <img id="parentTwoPreview" alt="">
                  <span class="drop">Parent<br>Photo</span>
                </label>
              </div>
            </div>
            <div class="bio-grid">
              <div class="field"><label for="bloodType">Blood Type</label><input id="bloodType" data-save="bloodType" type="text"></div>
              <div class="field"><label for="eyeColor">Eye Color</label><input id="eyeColor" data-save="eyeColor" type="text"></div>
              <div class="field"><label for="hair">Hair</label><input id="hair" data-save="hair" type="text"></div>
              <div class="field"><label for="skin">Skin</label><input id="skin" data-save="skin" type="text"></div>
            </div>
            <div class="description-grid">
              <div class="description-box">
                <label for="characterDescription">Character Description</label>
                <textarea id="characterDescription" data-save="characterDescription" placeholder="Personality, appearance, history, secrets, promises..."></textarea>
              </div>
              <div class="description-box">
                <label for="costumeDescription">Hero Costume Description</label>
                <textarea id="costumeDescription" data-save="costumeDescription" placeholder="Suit design, colors, mask, symbols, gear, support items..."></textarea>
              </div>
            </div>
          </div>
          <div class="panel"><span class="panel-title">Traits & Tags</span><textarea id="traits" data-save="traits" class="tall" placeholder="Battle ready, alien heritage, public identity, mentor, rival..."></textarea></div>
        </section>
      </div>
      <div class="cards">
        <article class="power-card"><input class="card-number" aria-label="Card one number" data-save="action1Number" type="number"><label for="action1">Quirk</label><input id="action1" data-save="action1" type="text"><label for="action1Power">Description</label><textarea id="action1Power" data-save="action1Power"></textarea></article>
        <article class="power-card"><input class="card-number" aria-label="Card two number" data-save="action2Number" type="number"><label for="action2">Quirk</label><input id="action2" data-save="action2" type="text"><label for="action2Power">Description</label><textarea id="action2Power" data-save="action2Power"></textarea></article>
        <article class="power-card"><input class="card-number" aria-label="Card three number" data-save="action3Number" type="number"><label for="action3">Quirk</label><input id="action3" data-save="action3" type="text"><label for="action3Power">Description</label><textarea id="action3Power" data-save="action3Power"></textarea></article>
        <article class="power-card"><input class="card-number" aria-label="Card four number" data-save="action4Number" type="number"><label for="action4">Quirk</label><input id="action4" data-save="action4" type="text"><label for="action4Power">Description</label><textarea id="action4Power" data-save="action4Power"></textarea></article>
        <article class="power-card"><input class="card-number" aria-label="Card five number" data-save="action5Number" type="number"><label for="action5">Quirk</label><input id="action5" data-save="action5" type="text"><label for="action5Power">Description</label><textarea id="action5Power" data-save="action5Power"></textarea></article>
      </div>
    </section>
  </main>

  <input class="hidden-file" id="characterBodyInput" type="file" accept="image/*">
  <input class="hidden-file" id="heroCostumeInput" type="file" accept="image/*">
  <input class="hidden-file" id="parentOneInput" type="file" accept="image/*">
  <input class="hidden-file" id="parentTwoInput" type="file" accept="image/*">

  <script>
    const params = new URLSearchParams(window.location.search);
    let characterId = cleanCharacterId(params.get("character") || "default");
    let storeKey = storageKey(characterId);
    const fields = Array.from(document.querySelectorAll("[data-save]"));
    const characterSlot = document.querySelector("#characterSlot");
    const characterBodyPreview = document.querySelector("#characterBodyPreview");
    const heroCostumePreview = document.querySelector("#heroCostumePreview");
    const parentOnePreview = document.querySelector("#parentOnePreview");
    const parentTwoPreview = document.querySelector("#parentTwoPreview");
    const health = document.querySelector("#health");
    const maxHealth = document.querySelector("#maxHealth");
    const damageAmount = document.querySelector("#damageAmount");
    const healAmount = document.querySelector("#healAmount");
    const healthMeter = document.querySelector("#healthMeter");
    const radarShape = document.querySelector("#radarShape");

    function cleanCharacterId(value) {
      return String(value || "default").trim().toLowerCase().replace(/[^a-z0-9-]+/g, "-").replace(/^-+|-+$/g, "") || "default";
    }
    function storageKey(id) {
      return `superhero-ttrpg-sheet-v2-${id}`;
    }
    function setCharacterSlot(id, updateAddress = true) {
      characterId = cleanCharacterId(id);
      storeKey = storageKey(characterId);
      characterSlot.value = characterId;
      if (updateAddress && window.location.protocol !== "file:") {
        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set("character", characterId);
        window.history.replaceState({}, "", nextUrl);
      }
    }

    function setImage(kind, dataUrl) {
      const images = {
        characterBody: characterBodyPreview,
        heroCostume: heroCostumePreview,
        parentOne: parentOnePreview,
        parentTwo: parentTwoPreview
      };
      const img = images[kind];
      img.src = dataUrl || "";
      img.parentElement.classList.toggle("has-image", Boolean(dataUrl));
    }
    function readImage(file, kind) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => { setImage(kind, reader.result); save(); };
      reader.readAsDataURL(file);
    }
    function updateUi() {
      document.querySelectorAll("[data-stat]").forEach((input) => input.nextElementSibling.textContent = input.value);
      const statInputs = Array.from(document.querySelectorAll("[data-stat]"));
      radarShape.setAttribute("points", statInputs.map((input, index) => radarPoint(index, input.value)).join(" "));
      const max = Math.max(1, Number(maxHealth.value || 1));
      const current = Math.max(0, Math.min(max, Number(health.value || 0)));
      if (String(current) !== health.value) health.value = current;
      const pct = Math.max(0, Math.min(100, current / max * 100));
      healthMeter.style.width = pct + "%";
    }
    function radarPoint(index, value) {
      const angle = -90 + index * 72;
      const radius = 9.6 * Number(value);
      const radians = angle * Math.PI / 180;
      return [
        120 + Math.cos(radians) * radius,
        120 + Math.sin(radians) * radius
      ].map((number) => number.toFixed(1)).join(",");
    }
    function collect() {
      const data = {};
      fields.forEach((field) => data[field.dataset.save] = field.value);
      data.characterSlot = characterId;
      data.savedAt = new Date().toISOString();
      data.characterBody = characterBodyPreview.src.startsWith("data:") ? characterBodyPreview.src : "";
      data.heroCostume = heroCostumePreview.src.startsWith("data:") ? heroCostumePreview.src : "";
      data.parentOne = parentOnePreview.src.startsWith("data:") ? parentOnePreview.src : "";
      data.parentTwo = parentTwoPreview.src.startsWith("data:") ? parentTwoPreview.src : "";
      return data;
    }
    function encodeCharacterData(data) {
      return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
    }
    function decodeCharacterData(encoded) {
      return JSON.parse(decodeURIComponent(escape(atob(encoded))));
    }
    function apply(data) {
      fields.forEach((field) => field.value = data[field.dataset.save] ?? field.defaultValue ?? "");
      setImage("characterBody", data.characterBody || data.hero || "");
      setImage("heroCostume", data.heroCostume || "");
      setImage("parentOne", data.parentOne || "");
      setImage("parentTwo", data.parentTwo || "");
      updateUi();
    }
    function save() { localStorage.setItem(storeKey, JSON.stringify(collect())); }
    function load() {
      const raw = localStorage.getItem(storeKey);
      if (!raw) return false;
      apply(JSON.parse(raw));
      return true;
    }
    function resetSheet() {
      fields.forEach((field) => field.value = field.type === "range" ? "5" : field.defaultValue || "");
      setImage("characterBody", "");
      setImage("heroCostume", "");
      setImage("parentOne", "");
      setImage("parentTwo", "");
      updateUi();
    }
    function clearSheet() {
      resetSheet();
      localStorage.removeItem(storeKey);
    }
    function openCharacter() {
      save();
      setCharacterSlot(characterSlot.value);
      if (!load()) resetSheet();
    }
    function characterFileName(extension) {
      const name = cleanCharacterId(document.querySelector("#heroName").value || document.querySelector("#characterName").value || characterId);
      return `${name}-character-sheet.${extension}`;
    }
    function downloadTextFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      downloadUrl(filename, url);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function downloadUrl(filename, url) {
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      a.style.display = "none";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
    function exportData() {
      downloadTextFile(characterFileName("json"), JSON.stringify(collect(), null, 2), "application/json");
    }
    function buildStandaloneHtml(data) {
      const exportScript = `
  <script data-exported-character>
    window.addEventListener("load", () => {
      const data = ${JSON.stringify(data).replace(/</g, "\\u003c")};
      if (window.setCharacterSlot && data.characterSlot) setCharacterSlot(data.characterSlot, false);
      if (window.apply) apply(data);
      if (window.save) save();
    });
  <\/script>`;
      return "<!doctype html>\n" + document.documentElement.outerHTML
        .replace(/\n\s*<script data-exported-character>[\s\S]*?<\/script>/g, "")
        .replace("</body>", `${exportScript}\n</body>`);
    }
    function exportHtml() {
      downloadTextFile(characterFileName("html"), buildStandaloneHtml(collect()), "text/html");
    }
    function escapeSrcdoc(html) {
      return html
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
    function exportObsidian() {
      const noteName = characterFileName("md");
      const title = document.querySelector("#heroName").value || document.querySelector("#characterName").value || characterId;
      const encoded = encodeURIComponent(encodeCharacterData(collect()));
      const sheetUrl = `https://feuwkkiwi-ux.github.io/superhero-ttrpg-character-sheet/#data=${encoded}`;
      const note = `# ${title} Character Sheet

<iframe
  src="${sheetUrl}"
  width="100%"
  height="1400"
  style="border:0; width:100%; min-height:1400px;"
></iframe>

Open this note in reading view to use the interactive sheet.
`;
      downloadTextFile(noteName, note, "text/markdown");
    }
    function copyFormValues(source, clone) {
      const sourceFields = Array.from(source.querySelectorAll("input, textarea, select"));
      const cloneFields = Array.from(clone.querySelectorAll("input, textarea, select"));
      sourceFields.forEach((field, index) => {
        const copy = cloneFields[index];
        if (!copy) return;
        if (copy.tagName === "TEXTAREA") copy.textContent = field.value;
        if (copy.tagName === "SELECT") {
          Array.from(copy.options).forEach((option) => {
            option.selected = option.value === field.value || option.text === field.value;
          });
        }
        if (copy.tagName === "INPUT") copy.setAttribute("value", field.value);
      });
    }
    function makeExportTextBox(field) {
      const box = document.createElement("div");
      const style = getComputedStyle(field);
      box.textContent = field.tagName === "SELECT"
        ? field.options[field.selectedIndex]?.text || ""
        : field.value || "";
      box.style.width = "100%";
      box.style.minHeight = Math.max(field.scrollHeight, field.offsetHeight, 28) + "px";
      box.style.padding = style.padding;
      box.style.border = style.border;
      box.style.background = style.backgroundColor === "rgba(0, 0, 0, 0)" ? "transparent" : style.background;
      box.style.color = style.color;
      box.style.fontFamily = style.fontFamily;
      box.style.fontSize = style.fontSize;
      box.style.fontWeight = style.fontWeight;
      box.style.lineHeight = style.lineHeight;
      box.style.whiteSpace = "pre-wrap";
      box.style.overflow = "visible";
      box.style.wordBreak = "break-word";
      return box;
    }
    function makeExportRange(field) {
      const wrap = document.createElement("div");
      const value = Number(field.value || 0);
      const min = Number(field.min || 0);
      const max = Number(field.max || 10);
      const pct = Math.max(0, Math.min(100, (value - min) / Math.max(1, max - min) * 100));
      wrap.style.position = "relative";
      wrap.style.width = "100%";
      wrap.style.height = "18px";
      wrap.style.display = "flex";
      wrap.style.alignItems = "center";
      const track = document.createElement("div");
      track.style.width = "100%";
      track.style.height = "6px";
      track.style.border = "1px solid #aab4bd";
      track.style.borderRadius = "999px";
      track.style.background = "#f6f6f6";
      track.style.overflow = "hidden";
      const fill = document.createElement("span");
      fill.style.display = "block";
      fill.style.width = `${pct}%`;
      fill.style.height = "100%";
      fill.style.background = "#d91e2d";
      const knob = document.createElement("span");
      knob.style.position = "absolute";
      knob.style.left = `calc(${pct}% - 7px)`;
      knob.style.top = "2px";
      knob.style.width = "14px";
      knob.style.height = "14px";
      knob.style.borderRadius = "50%";
      knob.style.background = "#d91e2d";
      track.appendChild(fill);
      wrap.append(track, knob);
      return wrap;
    }
    function prepareExportClone(source) {
      const clone = source.cloneNode(true);
      clone.classList.add("exporting-image");
      copyFormValues(source, clone);
      const sourceFields = Array.from(source.querySelectorAll("input, textarea, select"));
      const cloneFields = Array.from(clone.querySelectorAll("input, textarea, select"));
      sourceFields.forEach((field, index) => {
        const copy = cloneFields[index];
        if (!copy) return;
        if (field.type === "range") {
          copy.replaceWith(makeExportRange(field));
        } else {
          copy.replaceWith(makeExportTextBox(field));
        }
      });
      clone.style.width = source.scrollWidth + "px";
      clone.style.minHeight = source.scrollHeight + "px";
      return clone;
    }
    function exportSvgFallback() {
      const sheet = document.querySelector(".sheet");
      const clone = prepareExportClone(sheet);
      clone.setAttribute("xmlns", "http://www.w3.org/1999/xhtml");
      const width = Math.ceil(sheet.scrollWidth);
      const height = Math.ceil(sheet.scrollHeight);
      const styles = Array.from(document.querySelectorAll("style")).map((style) => style.textContent).join("\n");
      const markup = new XMLSerializer().serializeToString(clone);
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
        <foreignObject width="100%" height="100%">
          <div xmlns="http://www.w3.org/1999/xhtml">
            <style>${styles}</style>
            ${markup}
          </div>
        </foreignObject>
      </svg>`;
      const image = new Image();
      const url = URL.createObjectURL(new Blob([svg], { type: "image/svg+xml;charset=utf-8" }));
      image.onload = () => {
        try {
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          const context = canvas.getContext("2d");
          context.fillStyle = "#ffffff";
          context.fillRect(0, 0, width, height);
          context.drawImage(image, 0, 0);
          downloadUrl(characterFileName("png"), canvas.toDataURL("image/png"));
        } catch (error) {
          alert("PNG export was blocked by this browser. I will download an SVG image instead.");
          downloadTextFile(characterFileName("svg"), svg, "image/svg+xml");
        } finally {
          URL.revokeObjectURL(url);
        }
      };
      image.onerror = () => {
        URL.revokeObjectURL(url);
        alert("Image export could not render in this browser. Try HTML or PDF instead.");
      };
      image.src = url;
    }
    async function exportPng() {
      const sheet = document.querySelector(".sheet");
      if (!window.html2canvas) {
        alert("PNG helper could not load. I will download an SVG image instead.");
        exportSvgFallback();
        return;
      }
      const clone = prepareExportClone(sheet);
      clone.style.position = "fixed";
      clone.style.left = "-10000px";
      clone.style.top = "0";
      clone.style.zIndex = "-1";
      document.body.appendChild(clone);
      try {
        const canvas = await html2canvas(clone, {
          backgroundColor: "#ffffff",
          scale: 2,
          useCORS: true
        });
        downloadUrl(characterFileName("png"), canvas.toDataURL("image/png"));
      } catch (error) {
        console.error(error);
        alert("PNG export was blocked by this browser. I will download an SVG image instead.");
        exportSvgFallback();
      } finally {
        clone.remove();
      }
    }
    function loadEmbeddedCharacter() {
      const match = window.location.hash.match(/^#data=(.+)$/);
      if (!match) return false;
      try {
        const data = decodeCharacterData(decodeURIComponent(match[1]));
        if (data.characterSlot) setCharacterSlot(data.characterSlot, false);
        apply(data);
        save();
        return true;
      } catch (error) {
        console.warn("Could not load embedded character data.", error);
        return false;
      }
    }

    setCharacterSlot(characterId, false);
    characterSlot.addEventListener("keydown", (event) => {
      if (event.key === "Enter") openCharacter();
    });
    document.querySelector("#openCharacterBtn").addEventListener("click", openCharacter);
    document.querySelector("#saveBtn").addEventListener("click", save);
    document.querySelector("#loadBtn").addEventListener("click", load);
    document.querySelector("#clearBtn").addEventListener("click", clearSheet);
    document.querySelector("#characterBodyInput").addEventListener("change", (event) => readImage(event.target.files[0], "characterBody"));
    document.querySelector("#heroCostumeInput").addEventListener("change", (event) => readImage(event.target.files[0], "heroCostume"));
    document.querySelector("#parentOneInput").addEventListener("change", (event) => readImage(event.target.files[0], "parentOne"));
    document.querySelector("#parentTwoInput").addEventListener("change", (event) => readImage(event.target.files[0], "parentTwo"));
    document.querySelector("#importFile").addEventListener("change", (event) => {
      const [file] = event.target.files;
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const data = JSON.parse(reader.result);
        if (data.characterSlot) setCharacterSlot(data.characterSlot);
        apply(data);
        save();
        event.target.value = "";
      };
      reader.readAsText(file);
    });
    fields.forEach((field) => field.addEventListener("input", () => { updateUi(); save(); }));
    document.querySelectorAll("[data-health-action], [data-hit]").forEach((button) => button.addEventListener("click", () => {
      const max = Math.max(1, Number(maxHealth.value || 1));
      const current = Math.max(0, Math.min(max, Number(health.value || 0)));
      if (button.dataset.hit === "full") {
        health.value = max;
      } else if (button.dataset.healthAction === "damage") {
        health.value = Math.max(0, current - Math.max(0, Number(damageAmount.value || 0)));
      } else if (button.dataset.healthAction === "heal") {
        health.value = Math.min(max, current + Math.max(0, Number(healAmount.value || 0)));
      }
      updateUi();
      save();
    }));
    document.querySelectorAll("[data-dice]").forEach((button) => button.addEventListener("click", () => {
      const sides = Number(button.dataset.dice);
      document.querySelector("#diceResult").textContent = `d${sides}: ${Math.floor(Math.random() * sides) + 1}`;
    }));
    updateUi();
    if (!loadEmbeddedCharacter()) load();
  </script>
